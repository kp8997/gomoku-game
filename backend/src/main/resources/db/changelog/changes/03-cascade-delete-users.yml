databaseChangeLog:
  - changeSet:
      id: 4-cascade-delete-users
      author: gomoku
      comment: "Drop all potential variations of FK constraints referencing users and recreate them with ON DELETE CASCADE"
      changes:
        # 1. Safely drop constraints if they exist under either naming convention
        - sql:
            dbms: postgresql
            sql: |
              ALTER TABLE confrontation_records DROP CONSTRAINT IF EXISTS fk_confrontation_records_user_a_id;
              ALTER TABLE confrontation_records DROP CONSTRAINT IF EXISTS fk_confrontation_records_user_b_id;
              ALTER TABLE confrontation_records DROP CONSTRAINT IF EXISTS fk_confrontation_user_a;
              ALTER TABLE confrontation_records DROP CONSTRAINT IF EXISTS fk_confrontation_user_b;
              ALTER TABLE user_achievements DROP CONSTRAINT IF EXISTS fk_achievement_user;
              ALTER TABLE user_equipped_effects DROP CONSTRAINT IF EXISTS fk_equipped_user;

        # 2. Re-add confrontation_records constraints with CASCADE
        - addForeignKeyConstraint:
            baseTableName: confrontation_records
            baseColumnNames: user_a_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_confrontation_user_a
            onDelete: CASCADE

        - addForeignKeyConstraint:
            baseTableName: confrontation_records
            baseColumnNames: user_b_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_confrontation_user_b
            onDelete: CASCADE

        # 3. Re-add user_achievements constraint with CASCADE
        - addForeignKeyConstraint:
            baseTableName: user_achievements
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_achievement_user
            onDelete: CASCADE

        # 4. Re-add user_equipped_effects constraint with CASCADE
        - addForeignKeyConstraint:
            baseTableName: user_equipped_effects
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_equipped_user
            onDelete: CASCADE
