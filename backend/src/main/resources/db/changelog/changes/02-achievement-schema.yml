databaseChangeLog:
  - changeSet:
      id: 3-achievement-tables
      author: gomoku
      logicalFilePath: db/changelog/changes/02-achievement-schema.xml
      changes:
        - createTable:
            tableName: user_achievements
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_achievement_user
                    referencedTableName: users
                    referencedColumnNames: id
              - column:
                  name: achievement_key
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: unlocked_at
                  type: TIMESTAMP(6)
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: user_achievements
            columnNames: user_id,achievement_key
            constraintName: uq_user_achievement
        - createIndex:
            tableName: user_achievements
            indexName: idx_achievement_user
            columns:
              - column:
                  name: user_id
        - createTable:
            tableName: user_equipped_effects
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    unique: true
                    foreignKeyName: fk_equipped_user
                    referencedTableName: users
                    referencedColumnNames: id
              - column:
                  name: effect_key
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP(6)
                  constraints:
                    nullable: false
