name: Deploy to Oracle Cloud

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Define project directory using $HOME for absolute path safety
            PROJECT_DIR="$HOME/spring-boot-react-gomoku-game"
            
            # Check if directory exists
            if [ ! -d "$PROJECT_DIR" ]; then
              echo "Project directory not found. Cloning for the first time..."
              git clone https://github.com/kp8997/gomoku-game.git "$PROJECT_DIR"
            fi
            
            cd "$PROJECT_DIR"
            
            # Pull latest changes
            git pull origin master
            
            # Build and restart only the backend service
            docker compose up -d --build backend
